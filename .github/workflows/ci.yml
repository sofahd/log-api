name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff bandit
          pip install flask pytz requests
          # sofahutils (public repo, no token needed)
          pip install "git+https://github.com/sofahd/sofahutils.git"
      - name: Lint (ruff, informational)
        run: ruff check .
        continue-on-error: true
      - name: Security gate (bandit, fails on high severity, e.g. shell=True)
        run: bandit -r src --severity-level high
      - name: Dockerfile lint (hadolint, informational)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
        continue-on-error: true
      - name: Tests
        run: pytest -q
